<svg xmlns="http://www.w3.org/2000/svg" width="2176" height="1222" viewBox="0 0 2176 1222" role="img" aria-labelledby="title desc">
  <title id="title">Basak Baptist Church Anniversary Invitation</title>
  <desc id="desc">Invitation card for Basak Baptist Church anniversary on May 4, 2026 at 8:00 AM in Purok 5 Basak, Nabunturan, Davao de Oro.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9efe2" />
      <stop offset="55%" stop-color="#fffaf4" />
      <stop offset="100%" stop-color="#f6e7d5" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c0916" />
      <stop offset="100%" stop-color="#b01727" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#6c0916" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="2176" height="1222" fill="url(#bg)" />
  <circle cx="142" cy="146" r="210" fill="#f4d7bc" opacity="0.38" />
  <circle cx="2022" cy="1038" r="240" fill="#f1d2b8" opacity="0.45" />
  <circle cx="1860" cy="178" r="120" fill="#f9ebdd" opacity="0.9" />
  <circle cx="332" cy="1030" r="136" fill="#fff5ea" opacity="0.9" />

  <rect x="118" y="108" width="1940" height="1006" rx="56" fill="#fffdfb" opacity="0.92" />
  <rect x="118" y="108" width="1940" height="1006" rx="56" fill="none" stroke="#edd7c1" stroke-width="4" />

  <g transform="translate(1088 218)" filter="url(#soft-shadow)">
    <circle r="120" fill="#fff7f3" />
    <image href="/assets/logo-red-isolated-320.png" x="-120" y="-120" width="240" height="240" preserveAspectRatio="xMidYMid meet" />
  </g>

  <text x="1088" y="402" text-anchor="middle" fill="#9e2230" font-family="Georgia, serif" font-size="40" letter-spacing="8">
    YOU ARE INVITED TO CELEBRATE WITH US
  </text>

  <text x="1088" y="558" text-anchor="middle" fill="#6c0916" font-family="Georgia, serif" font-size="118" font-weight="700">
    Basak Baptist Church
  </text>
  <text x="1088" y="656" text-anchor="middle" fill="#2f2322" font-family="Georgia, serif" font-size="70">
    Church Anniversary
  </text>

  <g transform="translate(498 742)">
    <rect width="360" height="110" rx="55" fill="#fffaf6" stroke="#e7c8b1" stroke-width="3" />
    <text x="180" y="71" text-anchor="middle" fill="#6f5a58" font-family="Georgia, serif" font-size="34" font-weight="700">May 4, 2026</text>
  </g>
  <g transform="translate(908 742)">
    <rect width="360" height="110" rx="55" fill="#fffaf6" stroke="#e7c8b1" stroke-width="3" />
    <text x="180" y="71" text-anchor="middle" fill="#6f5a58" font-family="Georgia, serif" font-size="34" font-weight="700">Monday</text>
  </g>
  <g transform="translate(1318 742)">
    <rect width="360" height="110" rx="55" fill="#fffaf6" stroke="#e7c8b1" stroke-width="3" />
    <text x="180" y="71" text-anchor="middle" fill="#6f5a58" font-family="Georgia, serif" font-size="34" font-weight="700">8:00 AM</text>
  </g>

  <text x="1088" y="946" text-anchor="middle" fill="#6f5a58" font-family="Georgia, serif" font-size="52">
    Purok 5 Basak, Nabunturan, Davao de Oro
  </text>

  <g transform="translate(688 1000)">
    <rect width="360" height="104" rx="52" fill="url(#accent)" />
    <text x="180" y="68" text-anchor="middle" fill="#fffaf6" font-family="Georgia, serif" font-size="32" font-weight="700">View Details</text>
  </g>
  <g transform="translate(1128 1000)">
    <rect width="360" height="104" rx="52" fill="#fffaf6" stroke="#e7c8b1" stroke-width="3" />
    <text x="180" y="68" text-anchor="middle" fill="#6c0916" font-family="Georgia, serif" font-size="32" font-weight="700">Open Location</text>
  </g>
