<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Basak Baptist Church anniversary preview image">
  <defs>
    <linearGradient id="silk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffefd" />
      <stop offset="48%" stop-color="#f8f2ee" />
      <stop offset="100%" stop-color="#fffdfb" />
    </linearGradient>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#7b121f" flood-opacity="0.10" />
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#b21f31" flood-opacity="0.10" />
    </filter>
    <linearGradient id="button-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c81d2f" />
      <stop offset="100%" stop-color="#a30f20" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#silk)" />
  <path d="M0 62c124 34 246 32 370 18s242-28 370-22 286 30 460-4v576H0z" fill="#fffdfb" opacity="0.72" />
  <path d="M0 188c188-18 316-36 480-8s294 60 466 38 182-26 254-10" fill="none" stroke="#f0e7e1" stroke-width="22" opacity="0.65" />
  <path d="M0 362c208 28 364 34 560 4s366-42 640 18" fill="none" stroke="#efe4dd" stroke-width="26" opacity="0.55" />
  <path d="M0 520c170-22 318-10 502 24s396 42 698-2" fill="none" stroke="#f3ebe5" stroke-width="18" opacity="0.60" />

  <ellipse cx="76" cy="86" rx="84" ry="118" fill="#cf3245" opacity="0.10" />
  <ellipse cx="1120" cy="520" rx="96" ry="132" fill="#cf3245" opacity="0.10" />
  <ellipse cx="914" cy="540" rx="120" ry="88" fill="#e8dbd3" opacity="0.28" />

  <g filter="url(#card-shadow)">
    <rect x="92" y="42" width="1016" height="546" rx="38" fill="#fffefe" fill-opacity="0.82" stroke="#fffdfc" stroke-opacity="0.95" />
  </g>

  <image href="./logo-red-isolated.png" x="506" y="58" width="188" height="188" preserveAspectRatio="xMidYMid meet" filter="url(#soft-glow)" />

  <text x="600" y="262" text-anchor="middle" font-size="20" letter-spacing="5" fill="#9d1624" font-family="Georgia, serif">
    YOU ARE INVITED TO CELEBRATE WITH US
  </text>

  <text x="600" y="360" text-anchor="middle" font-size="84" fill="#6f0d18" font-family="'Snell Roundhand', 'Brush Script MT', cursive">
    Basak Baptist
  </text>
  <text x="600" y="438" text-anchor="middle" font-size="84" fill="#6f0d18" font-family="'Snell Roundhand', 'Brush Script MT', cursive">
    Church
  </text>

  <text x="600" y="500" text-anchor="middle" font-size="34" fill="#2b2022" font-family="Georgia, serif" font-weight="600">
    Church Anniversary
  </text>

  <g font-family="Georgia, serif" font-size="20" fill="#6f6164">
    <rect x="329" y="525" width="150" height="44" rx="22" fill="#fffdfc" stroke="#ead7d5" stroke-width="1.5" />
    <text x="404" y="553" text-anchor="middle">May 4, 2026</text>

    <rect x="493" y="525" width="98" height="44" rx="22" fill="#fffdfc" stroke="#ead7d5" stroke-width="1.5" />
    <text x="542" y="553" text-anchor="middle">Monday</text>

    <rect x="605" y="525" width="116" height="44" rx="22" fill="#fffdfc" stroke="#ead7d5" stroke-width="1.5" />
    <text x="663" y="553" text-anchor="middle">8:00 AM</text>
  </g>
